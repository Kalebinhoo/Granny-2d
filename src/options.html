<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Granny - Opções</title>
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
  <div id="options-menu">
    <h1 id="title">OPÇÕES</h1>
    <div id="options-container">
      <div class="option-row">
        <label for="difficulty">Dificuldade:</label>
        <select id="difficulty">
          <option value="easy">Fácil</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Difícil</option>
          <option value="nightmare">Pesadelo</option>
        </select>
      </div>
      <div class="option-row">
        <label for="music">Música:</label>
        <input type="checkbox" id="music" checked>
      </div>
      <button id="back-btn">VOLTAR</button>
    </div>
  </div>
  <script src="../system/mainmenu.js" type="module"></script>
</body>
</html>
